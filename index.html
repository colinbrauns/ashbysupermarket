  function __applyIntrinsicsFix() {
    let f = document.getElementById('__intrinsics_helper');
    if (!f) {
      f = document.createElement('iframe');
      f.id = '__intrinsics_helper';
      f.style.cssText = 'display:none;position:absolute;width:0;height:0;border:0';
      (document.body || document.documentElement).appendChild(f);
    }
    if (f.contentWindow && typeof f.contentWindow.Map === 'function') {
      window.Map = f.contentWindow.Map;
      window.WeakMap = f.contentWindow.WeakMap;
      window.Set = f.contentWindow.Set;
      window.WeakSet = f.contentWindow.WeakSet;

  }

  // Re-apply right before Babel auto-runs (it transforms on DOMContentLoaded in capture phase).
  document.addEventListener('DOMContentLoaded', __applyIntrinsicsFix, true);
  // And once more in case the stripping happens later.
  window.addEventListener('load', __applyIntrinsicsFix, true);

    (async function loadBabelScripts() {

      const tags = Array.from(document.querySelectorAll('script[data-babel]'));
      for (const tag of tags) {
        __applyIntrinsicsFix();
        let source;
        try {
          source = await fetch(tag.src).then(r => r.text());
        } catch (e) {
          console.error('failed to fetch', tag.src, e);
          continue;
        }
        __applyIntrinsicsFix();
        let compiled;
        try {
          compiled = Babel.transform(source, {
            presets: ['react'],
            filename: tag.src.split('/').pop(),
          }).code;
        } catch (e) {
          console.error('babel error in', tag.src, e);
          continue;
        }
        const s = document.createElement('script');
        // Wrap in IIFE so top-level const/let in each file don't collide with siblings
        // (these scripts all share global scope when injected as plain <script> tags).
        s.textContent = '(function(){\n' + compiled + '\n})();\n//# sourceURL=' + tag.src;
        document.body.appendChild(s);
      }
    })();
